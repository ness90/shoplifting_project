name: CSV Pipeline

on:
  push:
    branches:
      - master

jobs:
  validate-csv:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Install dependencies
        run: pip install pandas dvc

      - name: Pull DVC data
        run: dvc pull

      - name: Run pipeline
        run: dvc repro

      - name: Push processed data
        run: dvc push
